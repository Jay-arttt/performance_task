<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="팀 대시보드">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Gowun+Batang&family=Black+Han+Sans&family=Playfair+Display&family=Dancing+Script&family=Caveat&family=Pacifico&display=swap" rel="stylesheet">
  <title>퍼포먼스 업무 관리</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">대시보드 불러오는 중...</div>
</div>

<div class="app-wrapper">

  <header class="app-header">
    <span class="app-title">퍼포먼스 업무 관리</span>
    <div class="header-right">
      <span class="sync-badge sample" id="syncBadge">로딩 중</span>
    </div>
  </header>

  <!-- 화이트보드 메모 -->
  <div class="whiteboard-wrap" id="whiteboardWrap">
    <div class="wb-tray">
      <select class="wb-font-select" id="wbFont">
        <optgroup label="한글">
          <option value="'Noto Sans KR',sans-serif">Noto Sans KR</option>
          <option value="'Nanum Myeongjo',serif">나눔명조</option>
          <option value="'Nanum Pen Script',cursive">나눔펜</option>
          <option value="'Gowun Batang',serif">고운바탕</option>
          <option value="'Black Han Sans',sans-serif">블랙한산스</option>
        </optgroup>
        <optgroup label="영문">
          <option value="'Playfair Display',serif">Playfair Display</option>
          <option value="'Dancing Script',cursive">Dancing Script</option>
          <option value="'Caveat',cursive">Caveat</option>
          <option value="'Pacifico',cursive">Pacifico</option>
        </optgroup>
      </select>
      <div class="wb-sep"></div>
      <div class="wb-sizes">
        <button class="wb-sbtn" data-size="12">S</button>
        <button class="wb-sbtn on" data-size="15">M</button>
        <button class="wb-sbtn" data-size="19">L</button>
        <button class="wb-sbtn" data-size="24">XL</button>
      </div>
      <div class="wb-sep"></div>
      <div class="wb-colors">
        <div class="wb-cdot on" data-color="#2C2C2A" style="background:#2C2C2A;"></div>
        <div class="wb-cdot" data-color="#185FA5" style="background:#185FA5;"></div>
        <div class="wb-cdot" data-color="#A32D2D" style="background:#A32D2D;"></div>
        <div class="wb-cdot" data-color="#0F6E56" style="background:#0F6E56;"></div>
        <div class="wb-cdot" data-color="#7F77DD" style="background:#7F77DD;"></div>
        <div class="wb-cdot" data-color="#BA7517" style="background:#BA7517;"></div>
        <div class="wb-cdot" data-color="#888780" style="background:#888780;"></div>
      </div>
      <div class="wb-sep"></div>
      <div class="wb-styles">
        <button class="wb-stbtn" data-style="bold" style="font-weight:700;">B</button>
        <button class="wb-stbtn" data-style="italic" style="font-style:italic;">I</button>
        <button class="wb-stbtn" data-style="underline" style="text-decoration:underline;">U</button>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
        <span class="wb-status" id="wbStatus"></span>
        <button class="wb-save-btn" id="wbSaveBtn">저장</button>
        <button class="wb-toggle-btn" id="wbToggleBtn" title="접기/펼치기">▲</button>
      </div>
    </div>
    <div class="wb-body" id="wbBody">
      <textarea class="wb-editor" id="wbEditor" placeholder="팀 공유 메모를 입력하세요... 저장하면 모든 팀원에게 보여요"></textarea>
    </div>
  </div>

  <nav class="view-tabs">
    <button class="view-tab active" data-view="daily">
      <svg class="tab-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1.2" fill="currentColor"/><circle cx="12" cy="15" r="1.2" fill="currentColor"/></svg>
      데일리 업무
    </button>
    <button class="view-tab" data-view="flow">
      <svg class="tab-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="18" rx="1.5"/><rect x="9" y="7" width="6" height="14" rx="1.5"/><rect x="16" y="11" width="6" height="10" rx="1.5"/></svg>
      브랜드별 업무
    </button>
    <button class="view-tab" data-view="report">
      <svg class="tab-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      리포트
    </button>
    <button class="view-tab" data-view="etc">
      <svg class="tab-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      기타 업무
    </button>
    <button class="view-tab" data-view="resources">
      <svg class="tab-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      자료실
    </button>
  </nav>

  <div class="brand-tabs-wrap" id="brandTabsWrap"></div>
  <div id="flowControlsWrap"></div>
  <div class="member-filter-wrap" id="memberFilterWrap"></div>
  <div class="metrics-wrap" id="metricsWrap"></div>

  <div class="view-panel" id="panel-flow"></div>

  <div class="view-panel" id="panel-daily" hidden>
    <div class="daily-nav">
      <button class="day-nav-btn" id="prevDay">←</button>
      <span class="date-label" id="dailyDateLabel"></span>
      <button class="day-nav-btn" id="nextDay">→</button>
      <button class="today-btn" id="todayBtn">오늘</button>
      <div class="view-toggle" style="margin-left:auto;">
        <button class="vbtn active" id="dailyViewDay" data-dview="day">일간</button>
        <button class="vbtn" id="dailyViewWeek" data-dview="week">주간</button>
      </div>
    </div>
    <div class="daily-grid" id="dailyGrid"></div>
  </div>

  <div class="view-panel" id="panel-etc" hidden>
    <div id="etcContainer"></div>
  </div>

  <div class="view-panel" id="panel-report" hidden>
    <div class="report-grid" id="reportGrid"></div>
  </div>

  <!-- 자료실 -->
  <div class="view-panel" id="panel-resources" hidden></div>

</div>

<!-- 모바일 FAB 버튼 -->
<button class="mobile-add-fab" id="mobileFab" title="업무 추가">+</button>

<div class="toast-wrap">
  <div class="toast" id="toast"></div>
</div>

<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/recurring.js?v=5"></script>
<script src="js/modal.js"></script>
<script src="js/resources.js"></script>
<script src="js/app.js"></script>

<script>
  document.getElementById('mobileFab').addEventListener('click', () => {
    const view = document.querySelector('.view-tab.active')?.dataset.view;
    if (view === 'flow')        openModal('bulk');
    else if (view === 'etc')    openModal('add', 'common');
    else if (view === 'report') openModal('add', 'report');
    else if (view === 'resources') openResourceModal();
    else openModal('bulk');
  });
</script>

</body>
</html>
